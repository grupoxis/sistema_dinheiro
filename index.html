<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos por Voz - Diagnóstico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .total {
            font-size: 2em;
            text-align: center;
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .voice-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            transition: 0.2s;
        }
        .voice-btn.listening {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .debug-box {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            margin: 20px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
        }
        .status {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            color: #e67e22;
        }
        .last-expense {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .nav-btn {
            display: block;
            text-align: center;
            background: #95a5a6;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Diagnóstico por Voz</h1>
        
        <div class="total" id="totalDisplay">R$ 0,00</div>

        <button class="voice-btn" id="voiceBtn">🎤 INICIAR ESCUTA</button>

        <div class="status" id="status">Pronto. Clique no botão e fale.</div>

        <div class="debug-box" id="debug">
            [Aguardando comando de voz...]
        </div>

        <div class="last-expense" id="lastExpense">
            Nenhum gasto registrado ainda.
        </div>

        <a href="gastos.html" class="nav-btn">📋 Ver todos os gastos</a>
    </div>

    <script>
        // ========== UTILITÁRIOS ==========
        function addDebug(message) {
            const debugEl = document.getElementById('debug');
            const timestamp = new Date().toLocaleTimeString();
            debugEl.innerHTML = `[${timestamp}] ${message}\n` + debugEl.innerHTML;
            console.log(message);
        }

        // ========== DADOS ==========
        let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');

        function saveAndUpdate() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            updateTotal();
            updateLastExpense();
        }

        function updateTotal() {
            const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            document.getElementById('totalDisplay').innerText = `R$ ${total.toFixed(2)}`;
        }

        function updateLastExpense() {
            const last = expenses[expenses.length - 1];
            const lastEl = document.getElementById('lastExpense');
            if (last) {
                const date = new Date(last.date).toLocaleString('pt-BR');
                lastEl.innerHTML = `<strong>Último gasto:</strong><br>${last.local} - R$ ${last.amount.toFixed(2)}<br><small>${date}</small>`;
            } else {
                lastEl.innerHTML = 'Nenhum gasto registrado ainda.';
            }
        }

        function addExpense(local, amount) {
            const newExpense = {
                id: Date.now().toString(),
                date: new Date().toISOString(),
                local: local.trim(),
                amount: parseFloat(amount)
            };
            expenses.push(newExpense);
            saveAndUpdate();
            addDebug(`✅ GASTO ADICIONADO: ${local} - R$ ${amount.toFixed(2)}`);
        }

        // ========== RECONHECIMENTO DE VOZ ==========
        const voiceBtn = document.getElementById('voiceBtn');
        const statusEl = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusEl.innerText = '❌ Navegador não suporta reconhecimento de voz';
            voiceBtn.disabled = true;
            addDebug('ERRO: API de voz não suportada');
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = true; // MUDAMOS PARA true PARA VER O QUE ESTÁ SENDO CAPTADO
            recognition.maxAlternatives = 3;

            voiceBtn.addEventListener('click', () => {
                try {
                    recognition.start();
                    voiceBtn.classList.add('listening');
                    statusEl.innerText = '🎤 ESCUTANDO...';
                    addDebug('🎤 Iniciou escuta...');
                } catch (e) {
                    addDebug('❌ ERRO AO INICIAR: ' + e.message);
                }
            });

            // Captura resultados intermediários (enquanto fala)
            recognition.addEventListener('speechstart', () => {
                addDebug('🗣️ Detected: speech started');
            });

            recognition.addEventListener('speechend', () => {
                addDebug('🤐 Detected: speech ended');
            });

            recognition.addEventListener('result', (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (interimTranscript) {
                    statusEl.innerText = `🎤 Ouvindo: "${interimTranscript}"`;
                }

                if (finalTranscript) {
                    statusEl.innerText = `✅ Você disse: "${finalTranscript}"`;
                    addDebug(`📝 FINAL: "${finalTranscript}"`);
                    processVoiceInput(finalTranscript);
                }
            });

            recognition.addEventListener('error', (event) => {
                addDebug(`❌ ERRO: ${event.error} - ${event.message}`);
                statusEl.innerText = `Erro: ${event.error}`;
                voiceBtn.classList.remove('listening');
            });

            recognition.addEventListener('end', () => {
                voiceBtn.classList.remove('listening');
                if (!statusEl.innerText.includes('✅')) {
                    statusEl.innerText = 'Clique no botão e fale';
                }
                addDebug('⏹️ Escuta finalizada');
            });
        }

        // ========== PROCESSAR TEXTO ==========
        function processVoiceInput(text) {
            addDebug(`🔍 Processando: "${text}"`);
            
            // Várias formas de falar
            const patterns = [
                /(?:gastei|comprei|paguei|gasto de)\s+(\d+(?:[.,]\d+)?)\s*reais?\s*(?:no|na|em)?\s*(.+)/i,
                /(\d+(?:[.,]\d+)?)\s*reais?\s*(?:no|na|em)?\s*(.+)/i,
                /(?:comprei|paguei)\s*(.+?)\s*(?:por|por\s*)?(\d+(?:[.,]\d+)?)\s*reais?/i
            ];

            let match = null;
            for (let pattern of patterns) {
                match = text.match(pattern);
                if (match) break;
            }

            if (match) {
                let amount, local;
                
                // Detecta qual padrão casou
                if (match[1] && match[2]) {
                    amount = match[1].replace(',', '.');
                    local = match[2].trim();
                } else if (match[2] && match[3]) {
                    amount = match[2].replace(',', '.');
                    local = match[1].trim();
                } else {
                    addDebug('❌ Padrão não reconhecido');
                    return;
                }

                amount = parseFloat(amount);
                
                if (isNaN(amount) || amount <= 0) {
                    addDebug('❌ Valor inválido: ' + match[1]);
                    return;
                }

                if (!local || local.length < 3) {
                    addDebug('❌ Local inválido: ' + local);
                    return;
                }

                addExpense(local, amount);
            } else {
                addDebug('❌ Nenhum padrão encontrado no texto');
            }
        }

        // Inicializar
        updateTotal();
        updateLastExpense();
        addDebug('✅ App de diagnóstico carregado');
    </script>
</body>
</html>
